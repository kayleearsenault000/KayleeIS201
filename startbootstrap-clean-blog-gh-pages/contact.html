<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="Travel Destination Generator" />
        <meta name="author" content="Kaylee Arsenault" />
        <title>Travel Game</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css" />
        <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css" />
        <link href="css/styles.css" rel="stylesheet" />
        
        <style>
            .game-box {
                background: #f8f9fa;
                padding: 3rem;
                border-radius: 15px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.05);
                text-align: center;
                margin-top: 2rem;
            }
            #destination-display {
                min-height: 120px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                transition: opacity 0.3s ease;
            }
            .city-text {
                font-size: 2.5rem;
                font-weight: 700;
                color: #0085a1; /* Matching Bootstrap Theme Blue */
                margin-bottom: 0;
            }
            .country-text {
                font-size: 1.2rem;
                color: #6c757d;
                text-transform: uppercase;
                letter-spacing: 2px;
            }
            .btn-travel {
                background-color: #0085a1;
                color: white;
                padding: 15px 30px;
                font-size: 1.1rem;
                border-radius: 5px;
                border: none;
                font-weight: 800;
                text-transform: uppercase;
            }
            .btn-travel:hover {
                background-color: #00657b;
                color: white;
            }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-light" id="mainNav">
            <div class="container px-4 px-lg-5">
                <a class="navbar-brand" href="index.html">Kaylee Arsenault</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                    Menu
                    <i class="fas fa-bars"></i>
                </button>
                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav ms-auto py-4 py-lg-0">
                        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="about.html">Resume</a></li>
                        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="fromScratch.html">Travel Guide</a></li>
                        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="contact.html">Travel Game</a></li>
                    </ul>
                </div>
            </div>
        </nav>
        <header class="masthead" style="background-image: url('assets/img/pale-vintage-world-map.jpg')">
            <div class="container position-relative px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">
                        <div class="page-heading">
                            <h1>Travel Game</h1>
                            <span class="subheading">Can't decide where to go? Let us pick!</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>
        <main class="mb-4">
            <div class="container px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">
                        <p>Click the button below to generate your next dream vacation destination. Adventure is just a click away!</p>
                        
                        <div class="game-box">
                            <div id="destination-display">
                                <p class="text-muted italic">Waiting for your input...</p>
                            </div>
                            <button class="btn btn-travel" onclick="generateTravel()">Pick a Destination</button>
                        </div>

                    </div>
                </div>
            </div>
        </main>
        <footer class="border-top">
            <div class="container px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">
                        <div class="small text-center text-muted fst-italic">Copyright &copy; Kaylee Arsenault 2026</div>
                    </div>
                </div>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        
        <script>
            const destinations = [
                { city: "Paris", country: "France" },
                { city: "Tokyo", country: "Japan" },
                { city: "Rome", country: "Italy" },
                { city: "Sydney", country: "Australia" },
                { city: "Cairo", country: "Egypt" },
                { city: "Rio de Janeiro", country: "Brazil" },
                { city: "New York City", country: "USA" },
                { city: "Santorini", country: "Greece" },
                { city: "Barcelona", country: "Spain" },
                { city: "Bali", country: "Indonesia" },
                { city: "London", country: "United Kingdom" },
                { city: "Machu Picchu", country: "Peru" },
                { city: "Swiss Alps", country: "Switzerland" },
                { city: "Amsterdam", country: "Netherlands" },
                { city: "Dubai", country: "UAE" }
            ];

            function generateTravel() {
                const display = document.getElementById('destination-display');
                display.style.opacity = 0;

                setTimeout(() => {
                    const random = destinations[Math.floor(Math.random() * destinations.length)];
                    display.innerHTML = `
                        <h2 class="city-text">${random.city}</h2>
                        <p class="country-text">${random.country}</p>
                    `;
                    display.style.opacity = 1;
                }, 200);
            }
        </script>
    </body>
</html>
